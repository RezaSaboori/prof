<!-- ============================================================
     Reusable notify modal — triggered via window.notify(options)
     Structure mirrors auth-modal-panel glass exactly.
     ============================================================ -->
<div id="notifyModalOverlay" class="auth-modal-overlay notify-modal-overlay" hidden aria-modal="true" role="dialog" aria-labelledby="notifyModalCategory">

    <div class="auth-modal-panel notify-modal-panel">

        <div class="auth-modal-topbar">
            <span id="notifyModalCategory" class="auth-modal-logo-text notify-modal-category"></span>
            <button type="button" class="auth-modal-close" aria-label="Close notification">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

        <p id="notifyModalTitle" class="notify-modal-title" hidden></p>
        <p id="notifyModalBody" class="notify-modal-body"></p>

        <div class="notify-modal-footer">
            <button type="button" id="notifyModalOkBtn" class="btn btn-primary">OK</button>
        </div>

    </div>

</div>
