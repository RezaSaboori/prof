{% load static %}
<header class="site-header">
    <div class="header-container">
        <a href="{% url 'landing_page:home' %}" class="logo" aria-label="Prof home">
            <span class="logo-text">Prof</span>
        </a>

        {% if show_main_nav %}
        <nav class="main-nav" aria-label="Main navigation">
            <a href="#solution" class="nav-link">How It Works</a>
            <a href="#features" class="nav-link">Features</a>
            <a href="#pricing" class="nav-link">Pricing</a>
            <a href="#who" class="nav-link">Who It's For</a>
        </nav>
        {% endif %}

        {% if user.is_authenticated %}
            <a href="{% url 'dashboard:index' %}" class="header-cta">Dashboard</a>
        {% else %}
            <button class="header-cta" id="signInTrigger" aria-haspopup="dialog" aria-expanded="false">Sign In</button>
        {% endif %}
    </div>
</header>

{% if not user.is_authenticated %}
<div class="auth-modal-overlay" id="authModalOverlay" role="dialog" aria-modal="true" aria-labelledby="authModalTitle" hidden>
    <div class="auth-modal-panel glass">
        <button class="auth-modal-close" id="authModalClose" aria-label="Close sign in modal">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>

        <div class="auth-modal-header">
            <span class="auth-modal-logo-text">Prof</span>
            <h2 class="auth-modal-title" id="authModalTitle">Welcome</h2>
            <p class="auth-modal-subtitle">Sign in or create your account with Google</p>
        </div>

        <a id="authModalGoogleBtn" href="{% url 'social:begin' 'google-oauth2' %}" class="btn btn-primary auth-modal-google-btn" target="_blank" rel="noopener noreferrer">
            <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Continue with Google
        </a>

        <label class="auth-modal-stay-row">
            <input type="checkbox" id="authModalStaySignedIn" checked />
            Keep me signed in for 30 days
        </label>
    </div>
</div>
{% endif %}
