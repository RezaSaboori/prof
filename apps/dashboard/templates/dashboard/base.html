{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Dashboard – Prof{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { display: flex; font-family: 'Segoe UI', system-ui, sans-serif;
           background: #0f1117; color: #e2e8f0; }

    .sidebar {
      width: 240px; min-height: 100vh;
      background: rgba(255,255,255,0.04);
      border-right: 1px solid rgba(255,255,255,0.08);
      display: flex; flex-direction: column;
      position: fixed; left: 0; top: 0; bottom: 0; z-index: 100;
    }
    .sidebar__brand {
      padding: 28px 24px 20px; font-size: 1.5rem; font-weight: 800;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar__user {
      padding: 14px 24px; font-size: 0.82rem; color: rgba(255,255,255,0.4);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sidebar__nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
    .sidebar__nav a {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: 10px; text-decoration: none;
      color: rgba(255,255,255,0.65); font-size: 0.9rem; font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }
    .sidebar__nav a:hover  { background: rgba(255,255,255,0.07); color: #fff; }
    .sidebar__nav a.active {
      background: linear-gradient(135deg,rgba(167,139,250,0.2),rgba(96,165,250,0.2));
      color: #a78bfa; border: 1px solid rgba(167,139,250,0.3);
    }
    .sidebar__nav a svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.8; }
    .sidebar__signout { padding: 12px; border-top: 1px solid rgba(255,255,255,0.06); }
    .sidebar__signout a {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: 10px; text-decoration: none;
      color: rgba(239,68,68,0.8); font-size: 0.9rem; font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }
    .sidebar__signout a:hover { background: rgba(239,68,68,0.1); color: #ef4444; }

    .main { margin-left: 240px; flex: 1; min-height: 100vh; padding: 40px; }

    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar__brand, .sidebar__user,
      .sidebar__nav a span, .sidebar__signout a span { display: none; }
      .sidebar__nav a, .sidebar__signout a { justify-content: center; padding: 12px; }
      .main { margin-left: 60px; padding: 24px 16px; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<aside class="sidebar">
  <div class="sidebar__brand">Prof</div>
  <div class="sidebar__user">{{ user.email }}</div>
  <nav class="sidebar__nav">
    <a href="{% url 'dashboard:index' %}" class="{% if active_tab == 'home' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Home</span>
    </a>
    <a href="{% url 'dashboard:infos' %}" class="{% if active_tab == 'infos' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/>
      </svg>
      <span>Info's</span>
    </a>
    <a href="{% url 'dashboard:jobs' %}" class="{% if active_tab == 'jobs' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
      </svg>
      <span>Job's</span>
    </a>
  </nav>
  <div class="sidebar__signout">
    <a href="{% url 'authentication:logout' %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span>Sign Out</span>
    </a>
  </div>
</aside>

<main class="main">{% block content %}{% endblock %}</main>
</body>
</html>
