{% extends 'core/base.html' %}
{% load static %}

{% block title %}{% block dashboard_title %}Dashboard{% endblock %} – Prof{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
{% endblock %}

{% block content %}
<div class="dashboard-layout">

    <aside class="dashboard-island glass" aria-label="Dashboard navigation">
        <div class="dashboard-island__brand">
            <span class="dashboard-island__logo-text">Dashboard</span>
        </div>
        <nav class="dashboard-island__nav">
            <a href="{% url 'dashboard:index' %}" class="{% if active_tab == 'home' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                <span>Home</span>
            </a>
            <a href="{% url 'dashboard:infos' %}" class="{% if active_tab == 'infos' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M20 21a8 8 0 1 0-16 0"/>
                </svg>
                <span>Info's</span>
            </a>
            <a href="{% url 'dashboard:jobs' %}" class="{% if active_tab == 'jobs' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="2" y="7" width="20" height="14" rx="2"/>
                    <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
                </svg>
                <span>Jobs</span>
            </a>
        </nav>

        <div class="dashboard-island__signout">
            <a href="{% url 'authentication:logout' %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                <span>Sign Out</span>
            </a>
        </div>
    </aside>

    <main class="dashboard-main">
        {% block dashboard_content %}{% endblock %}
    </main>

</div>

<script>
(function() {
    const sidebar = document.querySelector('.dashboard-island');
    const footer = document.querySelector('.site-footer');
    const layout = document.querySelector('.dashboard-layout');

    if (!sidebar || !footer || !layout) return;

    const observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
            if (entry.isIntersecting) {
                // Footer is visible — dock sidebar so it scrolls with footer
                sidebar.classList.add('dashboard-island--docked');
            } else {
                // Footer is off screen — restore fixed positioning
                sidebar.classList.remove('dashboard-island--docked');
            }
        });
    }, {
        threshold: 0,
        rootMargin: '0px'
    });

    observer.observe(footer);
})();
</script>
{% endblock %}
